name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        # 6.0.3 - https://github.com/actions/checkout/commit/df4cb1c069e1874edd31b4311f1884172cec0e10
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Set up JDK 25
        # 5.2.0 - https://github.com/actions/setup-java/commit/be666c2fcd27ec809703dec50e508c2fdc7f6654
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654
        with:
          java-version: '25'
          distribution: 'zulu'

      - name: Test with Maven
        run: mvn clean test

      - name: Upload coverage reports to Codecov
        # 6.0.1 - https://github.com/codecov/codecov-action/commit/e79a6962e0d4c0c17b229090214935d2e33f8354
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Cache SonarQube packages
        # 5.0.5 - https://github.com/actions/cache/commit/27d5ce7f107fe9357f9df03efb73ab90386fccae
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar
      - name: Cache Maven packages
        # 5.0.5 - https://github.com/actions/cache/commit/27d5ce7f107fe9357f9df03efb73ab90386fccae
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2
      - name: Build and analyze
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B package spring-boot:repackage verify org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=DerPyro_dj-wishlist

      #- name: Build with Maven
      # run: mvn package spring-boot:repackage -DskipTests

      - name: Build Docker Image
        run: |
          docker build --no-cache -t fehuworks/dj-wishlist .

      - name: Log in into Dockerhub
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
        run: echo "$DOCKER_PASSWORD" | docker login -u "$DOCKER_USERNAME" --password-stdin

      - name: Push Docker Image
        run: |
          docker push fehuworks/dj-wishlist